apiVersion: apps/v1
kind: Deployment

metadata:
  name: spring-boot-app
  namespace: spring-boot-prod

spec:
  replicas: 3

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

  selector:
    matchLabels:
      app: spring-boot-app

  template:

    metadata:
      labels:
        app: spring-boot-app

    spec:

      containers:

        - name: spring-boot-app

          image: spring-boot-app:2.0

          imagePullPolicy: Never

          ports:

            - containerPort: 8081


          startupProbe:

            httpGet:

              path: /actuator/health

              port: 8081

            initialDelaySeconds: 10

            periodSeconds: 5

            timeoutSeconds: 3

            failureThreshold: 12


          livenessProbe:

            httpGet:

              path: /actuator/health/liveness

              port: 8081

            initialDelaySeconds: 30

            periodSeconds: 10

            timeoutSeconds: 5

            failureThreshold: 3


          readinessProbe:

            httpGet:

              path: /actuator/health/readiness

              port: 8081

            initialDelaySeconds: 15

            periodSeconds: 5

            timeoutSeconds: 3

            failureThreshold: 3


          resources:

            requests:

              cpu: "250m"

              memory: "256Mi"


            limits:

              cpu: "500m"

              memory: "512Mi"